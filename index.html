<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>轻量日记 App</title>

  <meta name="theme-color" content="#fff8ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="轻量日记" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <style>
    :root{
      --bg:#fff8ed;
      --paper:#fffdf8;
      --ink:#23201e;
      --muted:#7b746e;
      --line:#eadfce;
      --accent:#ffb84d;
      --accent2:#ffdf8b;
      --green:#dceecb;
      --blue:#dcecf8;
      --pink:#ffe1e9;
      --shadow:0 12px 28px rgba(65,48,25,.11);
      --radius:22px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,#fff4d8 0,#fff8ed 34%,#f8f4ee 100%);color:var(--ink)}
    button,input,textarea,select{font:inherit;color:inherit}
    button{border:0;background:none;cursor:pointer}
    .app{max-width:1180px;margin:0 auto;padding:18px 14px 90px}
    .topbar{position:sticky;top:0;z-index:20;margin:-18px -14px 14px;padding:14px 14px 10px;background:rgba(255,248,237,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(234,223,206,.75)}
    .topbar-inner{max-width:1180px;margin:auto;display:flex;align-items:center;gap:10px;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#ff8c6b);display:grid;place-items:center;box-shadow:var(--shadow);font-size:22px}
    h1{font-size:19px;line-height:1.1;margin:0;white-space:nowrap}
    .subtitle{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .date-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .datebox,.searchbox{background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 12px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .datebox{min-width:146px}
    .iconbtn,.primary,.ghost{border-radius:999px;padding:10px 14px;border:1px solid var(--line);background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.04)}
    .primary{background:var(--accent);border-color:#f2a734;font-weight:700}
    .ghost:hover,.iconbtn:hover,.primary:hover{transform:translateY(-1px)}
    .layout{display:grid;grid-template-columns:1fr;gap:14px}
    @media (min-width:900px){.layout{grid-template-columns:260px 1fr}.sidebar{position:sticky;top:82px;align-self:start}.app{padding-left:20px;padding-right:20px}.topbar{margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px}}
    .panel,.card{background:rgba(255,253,248,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel{padding:14px}.panel h2,.card h2{font-size:15px;margin:0 0 10px}.muted{color:var(--muted);font-size:12px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px}.stat b{display:block;font-size:18px}.date-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto;padding-right:2px}.date-item{width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px 11px;display:flex;align-items:center;justify-content:space-between;gap:8px}.date-item.active{outline:2px solid var(--accent);background:#fff7de}.date-item small{display:block;color:var(--muted);margin-top:2px}.main{display:flex;flex-direction:column;gap:14px}.hero{padding:16px;display:grid;grid-template-columns:1fr;gap:12px;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-42px;top:-58px;width:160px;height:160px;border-radius:999px;background:rgba(255,184,77,.22);pointer-events:none}.hero-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;position:relative}.hero-title{font-size:22px;font-weight:800}.weekday{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--muted)}.quick{display:grid;grid-template-columns:1fr;gap:10px;position:relative}@media (min-width:720px){.quick{grid-template-columns:1.1fr .9fr .9fr}}
    .quick-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.quick-card label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 10px;min-width:42px;text-align:center}.chip.active{background:var(--accent2);border-color:#f1b950}.water{display:flex;gap:5px;align-items:center;flex-wrap:wrap}.drop{width:24px;height:24px;border-radius:999px;border:1px solid #bfd7e8;background:#fff;display:grid;place-items:center;font-size:12px;color:#75a6c6}.drop.active{background:#dcecf8}.grid{display:grid;grid-template-columns:1fr;gap:14px}@media (min-width:720px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}
    .card{padding:15px;position:relative}.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.card-title{display:flex;align-items:center;gap:8px;font-weight:800}.badge{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.form-grid{display:grid;grid-template-columns:1fr;gap:10px}@media (min-width:520px){.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}}
    .field label{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin:0 0 6px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:11px 12px;outline:none}.field textarea{min-height:92px;resize:vertical;line-height:1.55}.field input:focus,.field textarea:focus,.field select:focus{border-color:#e6a632;box-shadow:0 0 0 3px rgba(255,184,77,.22)}.radio-row{display:flex;gap:8px;flex-wrap:wrap}.radio-row label{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:#fff;color:var(--ink);font-size:13px;margin:0}.stars{display:flex;gap:4px}.star{font-size:23px;line-height:1;color:#d9cdbc}.star.active{color:#f3ad2f}.toolbar{display:flex;flex-wrap:wrap;gap:8px}.toolbar button,.toolbar label{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.03);cursor:pointer}.toolbar input[type=file]{display:none}.note-list{display:flex;flex-direction:column;gap:8px}.note-row{display:grid;grid-template-columns:42px 1fr auto;gap:8px;align-items:start}.note-row select,.note-row input{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px}.note-row button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;color:#8a5d4d}.add-note{margin-top:8px;background:#fff5dc;border:1px dashed #e3b35a;border-radius:14px;padding:10px;width:100%;color:#6b4a13}.empty{padding:16px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:#fff}.footerbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,248,237,.9);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:30}.footer-inner{max-width:1180px;margin:auto;display:flex;gap:8px;overflow:auto}.footer-inner button,.footer-inner label{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;cursor:pointer}.saved{margin-left:auto;color:var(--muted);font-size:12px;align-self:center;white-space:nowrap}.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:flex-end;z-index:50}.modal.show{display:flex}.sheet{background:var(--paper);width:100%;max-height:80vh;border-radius:24px 24px 0 0;padding:16px;overflow:auto}.sheet h2{margin:0 0 10px}.results{display:flex;flex-direction:column;gap:8px}.result{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:left}.result mark{background:#ffedaa;border-radius:4px}.tone-sleep{background:linear-gradient(180deg,#fff,#f7fbff)}.tone-diet{background:linear-gradient(180deg,#fff,#fff7f6)}.tone-reading{background:linear-gradient(180deg,#fff,#f8fff4)}.tone-exercise{background:linear-gradient(180deg,#fff,#f5fbff)}.tone-notes{background:linear-gradient(180deg,#fff,#fffaf0)}.tone-inspire{background:linear-gradient(180deg,#fff,#fff7fb)}.tone-learn{background:linear-gradient(180deg,#fff,#f8f8ff)}
    @media print{.topbar,.sidebar,.footerbar,.toolbar,.add-note,.note-row button{display:none!important}.app{padding:0;background:#fff}.layout{display:block}.card,.panel,.hero{box-shadow:none;break-inside:avoid}.grid{grid-template-columns:1fr 1fr}.field input,.field textarea,.field select{border:0;padding:2px;background:transparent}.modal{display:none!important}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo">✍️</div>
        <div><h1>轻量日记</h1><div class="subtitle">睡眠 · 饮食 · 阅读 · 运动 · 灵感 · 新知</div></div>
      </div>
      <div class="date-controls">
        <button class="iconbtn" id="prevDay" title="前一天">‹</button>
        <input class="datebox" id="entryDate" type="date" />
        <button class="iconbtn" id="nextDay" title="后一天">›</button>
        <button class="primary" id="todayBtn">今天</button>
      </div>
    </div>
  </div>

  <div class="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="panel" style="margin-bottom:14px">
          <h2>近 7 天概览</h2>
          <div class="stats">
            <div class="stat"><span class="muted">记录天数</span><b id="statDays">0</b></div>
            <div class="stat"><span class="muted">平均饮水</span><b id="statWater">0</b></div>
            <div class="stat"><span class="muted">阅读分钟</span><b id="statRead">0</b></div>
            <div class="stat"><span class="muted">运动分钟</span><b id="statExercise">0</b></div>
          </div>
        </div>
        <div class="panel">
          <h2>日记列表</h2>
          <input class="searchbox" id="searchInput" placeholder="搜索关键词" style="width:100%;margin-bottom:10px" />
          <div class="date-list" id="dateList"></div>
        </div>
      </aside>

      <main class="main">
        <section class="panel hero">
          <div class="hero-row">
            <div class="hero-title" id="prettyDate">今日记录</div>
            <span class="weekday" id="weekday">星期</span>
          </div>
          <div class="quick">
            <div class="quick-card">
              <label>今日心情</label>
              <div class="chips" id="moodChips"></div>
            </div>
            <div class="quick-card">
              <label>天气</label>
              <select id="weather" data-field="weather" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff">
                <option value="">选择天气</option><option>晴</option><option>多云</option><option>阴</option><option>雨</option><option>雪</option><option>大风</option><option>闷热</option>
              </select>
            </div>
            <div class="quick-card">
              <label>饮水</label>
              <div class="water" id="waterDots"></div>
            </div>
          </div>
        </section>

        <section class="grid">
          <div class="card tone-sleep">
            <div class="card-head"><div class="card-title">💤 今日睡眠</div><span class="badge" id="sleepHours">0 h</span></div>
            <div class="form-grid two">
              <div class="field"><label>睡觉时间</label><input type="time" data-field="sleep.bedtime"></div>
              <div class="field"><label>起床时间</label><input type="time" data-field="sleep.wakeup"></div>
            </div>
            <div class="field" style="margin-top:10px"><label>梦境 / 睡眠备注</label><textarea data-field="sleep.notes" placeholder="例如：半夜醒了几次、做梦内容、睡醒状态"></textarea></div>
            <div class="field" style="margin-top:10px"><label>睡眠质量</label><div class="stars" data-rating="sleep.rating"></div></div>
          </div>

          <div class="card tone-diet">
            <div class="card-head"><div class="card-title">🍽️ 今日饮食</div><span class="badge">三餐 + 评分</span></div>
            <div class="form-grid">
              <div class="field"><label>早餐</label><input data-field="diet.breakfast" placeholder="吃了什么"></div>
              <div class="field"><label>午餐</label><input data-field="diet.lunch" placeholder="吃了什么"></div>
              <div class="field"><label>晚餐</label><input data-field="diet.dinner" placeholder="吃了什么"></div>
              <div class="field"><label>加餐 / 饮品</label><input data-field="diet.snack" placeholder="奶、咖啡、水果、零食等"></div>
              <div class="field"><label>饮食方式</label><div class="radio-row" data-choice="diet.source"><label><input type="radio" value="堂食">堂食</label><label><input type="radio" value="外卖">外卖</label><label><input type="radio" value="自己做">自己做</label></div></div>
              <div class="field"><label>满意度</label><div class="stars" data-rating="diet.rating"></div></div>
            </div>
          </div>

          <div class="card tone-reading">
            <div class="card-head"><div class="card-title">📖 今日阅读</div><span class="badge" id="readBadge">0 分钟</span></div>
            <div class="form-grid two">
              <div class="field"><label>今日在读</label><input data-field="reading.book" placeholder="书名 / 文章 / 课程"></div>
              <div class="field"><label>阅读时长</label><input type="number" min="0" data-field="reading.minutes" placeholder="分钟"></div>
            </div>
            <div class="field" style="margin-top:10px"><label>摘记 / 想法</label><textarea data-field="reading.notes" placeholder="今天读到什么？有什么想法？"></textarea></div>
          </div>

          <div class="card tone-exercise">
            <div class="card-head"><div class="card-title">🏃 今日运动</div><span class="badge" id="exerciseBadge">0 分钟</span></div>
            <div class="form-grid two">
              <div class="field"><label>运动内容</label><input data-field="exercise.type" placeholder="骑行、散步、普拉提、瑜伽等"></div>
              <div class="field"><label>运动时长</label><input type="number" min="0" data-field="exercise.minutes" placeholder="分钟"></div>
            </div>
            <div class="field" style="margin-top:10px"><label>身体反馈</label><textarea data-field="exercise.notes" placeholder="哪里酸痛？强度如何？精神状态如何？"></textarea></div>
          </div>

          <div class="card tone-notes wide">
            <div class="card-head"><div class="card-title">📝 今日流水账</div><span class="badge">按事件记录</span></div>
            <div id="noteList" class="note-list"></div>
            <button class="add-note" id="addNote">＋ 添加一条</button>
          </div>

          <div class="card tone-inspire">
            <div class="card-head"><div class="card-title">💡 今日灵感</div><span class="badge">自由书写</span></div>
            <div class="field"><label>灵感 / 感悟 / 情绪</label><textarea data-field="inspiration" placeholder="像纸本模板一样，写下今天突然想到的事、情绪、判断或提醒。"></textarea></div>
          </div>

          <div class="card tone-learn">
            <div class="card-head"><div class="card-title">⭐ 今日新知</div><span class="badge">内容 + 来源</span></div>
            <div class="field"><label>内容</label><textarea data-field="newLearning.content" placeholder="今天学到的新概念、方法、结论"></textarea></div>
            <div class="field" style="margin-top:10px"><label>来源</label><input data-field="newLearning.source" placeholder="书、课程、播客、网页、别人说的话"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="footerbar">
    <div class="footer-inner">
      <button id="copyYesterday">复制昨天</button>
      <button id="clearDay">清空当天</button>
      <button id="printDay">打印 / PDF</button>
      <button id="exportJson">导出 JSON</button>
      <button id="exportCsv">导出 CSV</button>
      <label>导入 JSON<input id="importJson" type="file" accept="application/json,.json"></label>
      <span class="saved" id="savedStatus">已自动保存</span>
    </div>
  </div>

  <div class="modal" id="searchModal"><div class="sheet"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><h2>搜索结果</h2><button class="ghost" id="closeSearch">关闭</button></div><div class="results" id="results"></div></div></div>

<script>
(function(){
  const STORE='paperDiary.v1';
  const moods=['😄','🙂','😐','😫','🥲','😴','🔥','🌧️'];
  const icons=['🕘','🌡️','⭐','💬','📌','✅','🍵','📚','🏃','💤'];
  const $=s=>document.querySelector(s);
  const $$=s=>Array.from(document.querySelectorAll(s));
  const TORONTO_TZ='America/Toronto';
  function ymdFromParts(parts){
    const get=t=>parts.find(p=>p.type===t)?.value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }
  function today(){
    const parts=new Intl.DateTimeFormat('en-CA',{timeZone:TORONTO_TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
    return ymdFromParts(parts);
  }
  function splitYMD(d){return d.split('-').map(Number);}
  function ymdFromUTC(x){
    const y=x.getUTCFullYear();
    const m=String(x.getUTCMonth()+1).padStart(2,'0');
    const day=String(x.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  let entries=load();
  let currentDate=today();
  let timer=null;

  function load(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return {}}}
  function persist(){localStorage.setItem(STORE,JSON.stringify(entries)); showSaved(); renderStats(); renderDateList();}
  function emptyEntry(date){return {date,mood:'',weather:'',water:0,sleep:{bedtime:'',wakeup:'',notes:'',rating:0},diet:{breakfast:'',lunch:'',dinner:'',snack:'',source:'',rating:0},reading:{book:'',minutes:'',notes:''},exercise:{type:'',minutes:'',notes:''},notes:[],inspiration:'',newLearning:{content:'',source:''},updatedAt:new Date().toISOString()}}
  function getEntry(){if(!entries[currentDate]) entries[currentDate]=emptyEntry(currentDate); return entries[currentDate];}
  function setDeep(obj,path,value){const parts=path.split('.');let cur=obj; for(let i=0;i<parts.length-1;i++){cur[parts[i]]=cur[parts[i]]||{};cur=cur[parts[i]];} cur[parts.at(-1)]=value; obj.updatedAt=new Date().toISOString();}
  function getDeep(obj,path){return path.split('.').reduce((o,k)=>o&&o[k],obj) ?? '';}
  function fmtDate(d){const [y,m,day]=splitYMD(d);return `${y}年${m}月${day}日`;}
  function weekday(d){const [y,m,day]=splitYMD(d);return ['周日','周一','周二','周三','周四','周五','周六'][new Date(Date.UTC(y,m-1,day,12)).getUTCDay()];}
  function addDays(d,n){const [y,m,day]=splitYMD(d);return ymdFromUTC(new Date(Date.UTC(y,m-1,day+n,12)))}
  function debounceSave(){clearTimeout(timer); $('#savedStatus').textContent='保存中…'; timer=setTimeout(()=>{persist(); $('#savedStatus').textContent='已自动保存'},220)}
  function showSaved(){const el=$('#savedStatus'); if(el) el.textContent='已自动保存';}

  function init(){
    $('#entryDate').value=currentDate;
    $('#entryDate').addEventListener('change',e=>{currentDate=e.target.value; renderAll();});
    $('#prevDay').onclick=()=>{currentDate=addDays(currentDate,-1); renderAll()};
    $('#nextDay').onclick=()=>{currentDate=addDays(currentDate,1); renderAll()};
    $('#todayBtn').onclick=()=>{currentDate=today(); renderAll()};
    $('#copyYesterday').onclick=copyYesterday;
    $('#clearDay').onclick=clearDay;
    $('#printDay').onclick=()=>window.print();
    $('#exportJson').onclick=exportJson;
    $('#exportCsv').onclick=exportCsv;
    $('#importJson').addEventListener('change',importJson);
    $('#searchInput').addEventListener('keydown',e=>{if(e.key==='Enter') openSearch(e.target.value.trim())});
    $('#searchInput').addEventListener('input',e=>{if(e.target.value.trim().length>1) openSearch(e.target.value.trim(), true)});
    $('#closeSearch').onclick=()=>$('#searchModal').classList.remove('show');
    $('#searchModal').addEventListener('click',e=>{if(e.target.id==='searchModal') e.currentTarget.classList.remove('show')});
    $('#addNote').onclick=()=>{const e=getEntry(); e.notes.push({icon:'🕘',text:''}); renderNotes(); debounceSave(); setTimeout(()=>{$$('.note-row input').at(-1)?.focus()},0)};
    renderMood(); renderWater(); renderRatings(); bindInputs(); renderAll();
  }

  function renderAll(){
    $('#entryDate').value=currentDate;
    $('#prettyDate').textContent=fmtDate(currentDate);
    $('#weekday').textContent=weekday(currentDate);
    const e=getEntry();
    $$('[data-field]').forEach(el=>{el.value=getDeep(e,el.dataset.field)});
    $$('#moodChips .chip').forEach(btn=>btn.classList.toggle('active',btn.dataset.value===e.mood));
    $('#weather').value=e.weather||'';
    renderWater();
    renderRatings();
    renderChoices();
    renderNotes();
    renderBadges();
    renderStats();
    renderDateList();
  }

  function bindInputs(){
    $$('[data-field]').forEach(el=>{el.addEventListener('input',()=>{setDeep(getEntry(),el.dataset.field,el.value); renderBadges(); debounceSave();}); el.addEventListener('change',()=>{setDeep(getEntry(),el.dataset.field,el.value); renderBadges(); debounceSave();});});
  }

  function renderMood(){
    const box=$('#moodChips'); box.innerHTML='';
    moods.forEach(m=>{const b=document.createElement('button'); b.className='chip'; b.dataset.value=m; b.textContent=m; b.onclick=()=>{const e=getEntry(); e.mood=e.mood===m?'':m; renderMood(); renderAll(); debounceSave()}; box.appendChild(b)});
  }

  function renderWater(){
    const e=getEntry(); const box=$('#waterDots'); box.innerHTML='';
    for(let i=1;i<=8;i++){const b=document.createElement('button'); b.className='drop'+(i<=Number(e.water||0)?' active':''); b.textContent='💧'; b.title=`${i} 杯`; b.onclick=()=>{e.water=(Number(e.water)===i?0:i); e.updatedAt=new Date().toISOString(); renderWater(); debounceSave()}; box.appendChild(b)}
    const s=document.createElement('span'); s.className='muted'; s.textContent=`${e.water||0}/8`; box.appendChild(s);
  }

  function renderRatings(){
    $$('[data-rating]').forEach(box=>{const path=box.dataset.rating; const val=Number(getDeep(getEntry(),path)||0); box.innerHTML=''; for(let i=1;i<=5;i++){const b=document.createElement('button'); b.className='star'+(i<=val?' active':''); b.textContent='★'; b.onclick=()=>{setDeep(getEntry(),path,val===i?0:i); renderRatings(); debounceSave()}; box.appendChild(b)}});
  }

  function renderChoices(){
    $$('[data-choice]').forEach(box=>{const path=box.dataset.choice; const val=getDeep(getEntry(),path); $$(`[data-choice="${path}"] input`).forEach(inp=>{inp.checked=inp.value===val; inp.onchange=()=>{if(inp.checked){setDeep(getEntry(),path,inp.value); debounceSave();}}})});
  }

  function renderNotes(){
    const e=getEntry(); const box=$('#noteList'); box.innerHTML='';
    if(!e.notes || !e.notes.length){box.innerHTML='<div class="empty">还没有流水账。可以按时间、事件或情绪添加。</div>';return}
    e.notes.forEach((n,idx)=>{
      const row=document.createElement('div'); row.className='note-row';
      const sel=document.createElement('select'); icons.forEach(ic=>{const o=document.createElement('option'); o.value=ic; o.textContent=ic; sel.appendChild(o)}); sel.value=n.icon||'🕘'; sel.onchange=()=>{n.icon=sel.value; e.updatedAt=new Date().toISOString(); debounceSave()};
      const input=document.createElement('input'); input.value=n.text||''; input.placeholder='记录一件事，例如：下午骑车 40 分钟 / 和朋友聊天 / 完成一个任务'; input.oninput=()=>{n.text=input.value; e.updatedAt=new Date().toISOString(); debounceSave()};
      const del=document.createElement('button'); del.textContent='删'; del.onclick=()=>{e.notes.splice(idx,1); renderNotes(); debounceSave()};
      row.append(sel,input,del); box.append(row);
    });
  }

  function renderBadges(){
    const e=getEntry();
    const minRead=Number(e.reading?.minutes||0); const minEx=Number(e.exercise?.minutes||0);
    $('#readBadge').textContent=`${minRead} 分钟`; $('#exerciseBadge').textContent=`${minEx} 分钟`;
    $('#sleepHours').textContent=sleepDuration(e.sleep?.bedtime,e.sleep?.wakeup);
  }
  function sleepDuration(b,w){if(!b||!w)return '0 h'; const [bh,bm]=b.split(':').map(Number); const [wh,wm]=w.split(':').map(Number); let start=bh*60+bm,end=wh*60+wm; if(end<=start) end+=1440; const h=(end-start)/60; return `${h.toFixed(h%1?1:0)} h`;}

  function renderDateList(){
    const dates=Object.keys(entries).sort().reverse(); const box=$('#dateList'); box.innerHTML='';
    if(!dates.length){box.innerHTML='<div class="empty">还没有保存的日记。</div>';return}
    dates.forEach(d=>{const e=entries[d]; const btn=document.createElement('button'); btn.className='date-item'+(d===currentDate?' active':''); const preview=[e.mood,e.weather,(e.notes||[]).map(x=>x.text).filter(Boolean)[0],e.inspiration,e.newLearning?.content].filter(Boolean).join(' · '); btn.innerHTML=`<span><b>${fmtDate(d)}</b><small>${weekday(d)} ${preview?escapeHtml(preview).slice(0,34):'空白记录'}</small></span><span>${e.water||0}💧</span>`; btn.onclick=()=>{currentDate=d; renderAll(); window.scrollTo({top:0,behavior:'smooth'})}; box.append(btn)});
  }
  function renderStats(){
    const dates=Object.keys(entries).sort().slice(-7); let days=0, water=0, read=0, ex=0;
    dates.forEach(d=>{const e=entries[d]; const has=JSON.stringify(e)!==JSON.stringify(emptyEntry(d)); if(has) days++; water+=Number(e.water||0); read+=Number(e.reading?.minutes||0); ex+=Number(e.exercise?.minutes||0)});
    $('#statDays').textContent=days; $('#statWater').textContent=days?Math.round(water/days*10)/10:0; $('#statRead').textContent=read; $('#statExercise').textContent=ex;
  }

  function copyYesterday(){
    const y=addDays(currentDate,-1); if(!entries[y]){alert('昨天还没有记录。');return}
    const src=JSON.parse(JSON.stringify(entries[y])); src.date=currentDate; src.updatedAt=new Date().toISOString(); entries[currentDate]=src; persist(); renderAll();
  }
  function clearDay(){if(confirm('清空这一天的日记？')){delete entries[currentDate]; persist(); renderAll();}}
  function exportJson(){downloadBlob(JSON.stringify(entries,null,2),'轻量日记备份.json','application/json')}
  function exportCsv(){
    const rows=[['日期','星期','心情','天气','饮水','睡觉','起床','早餐','午餐','晚餐','阅读分钟','运动分钟','今日流水账','今日灵感','今日新知','来源']];
    Object.keys(entries).sort().forEach(d=>{const e=entries[d]; rows.push([d,weekday(d),e.mood,e.weather,e.water,e.sleep?.bedtime,e.sleep?.wakeup,e.diet?.breakfast,e.diet?.lunch,e.diet?.dinner,e.reading?.minutes,e.exercise?.minutes,(e.notes||[]).map(n=>`${n.icon}${n.text}`).join(' | '),e.inspiration,e.newLearning?.content,e.newLearning?.source])});
    const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n'); downloadBlob('\ufeff'+csv,'轻量日记导出.csv','text/csv;charset=utf-8')
  }
  function importJson(ev){const file=ev.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=()=>{try{const data=JSON.parse(reader.result); if(typeof data!=='object'||Array.isArray(data)) throw new Error('bad'); entries={...entries,...data}; persist(); renderAll(); alert('导入完成。')}catch(e){alert('JSON 文件格式不正确。')}}; reader.readAsText(file); ev.target.value=''}
  function downloadBlob(content,name,type){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

  function openSearch(q,quiet){
    if(!q){if(!quiet)alert('请输入搜索词。');return}
    const hits=[]; Object.keys(entries).sort().reverse().forEach(d=>{const txt=flatten(entries[d]); if(txt.includes(q)) hits.push({d,txt})});
    const box=$('#results'); box.innerHTML='';
    if(!hits.length) box.innerHTML='<div class="empty">没有找到匹配内容。</div>';
    hits.forEach(h=>{const btn=document.createElement('button'); btn.className='result'; const i=Math.max(0,h.txt.indexOf(q)-18); const part=h.txt.slice(i,i+120); btn.innerHTML=`<b>${fmtDate(h.d)} · ${weekday(h.d)}</b><p class="muted">${escapeHtml(part).replaceAll(escapeHtml(q),'<mark>'+escapeHtml(q)+'</mark>')}</p>`; btn.onclick=()=>{currentDate=h.d; $('#searchModal').classList.remove('show'); renderAll();}; box.append(btn)});
    $('#searchModal').classList.add('show');
  }
  function flatten(x){return JSON.stringify(x).replace(/[{}"\[\],:]/g,' ')}
  function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  init();
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
