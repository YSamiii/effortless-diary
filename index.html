<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <meta name="theme-color" content="#fff8ed" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <style>
    :root{
      --bg:#fff8ed; --paper:#fffdf8; --ink:#23201e; --muted:#7b746e;
      --line:#eadfce; --accent:#ffb84d; --accent2:#ffdf8b; --soft:#fff3d6;

      --shadow:0 14px 36px rgba(65,48,25,.11); --radius:24px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:radial-gradient(circle at 0 0,#fff1cc 0,#fff8ed 36%,#f7f2eb 100%);color:var(--ink)}
    button,input,textarea,select{font:inherit;color:inherit} button{border:0;background:none;cursor:pointer} button:disabled{opacity:.45;cursor:not-allowed}
    .app{max-width:1180px;margin:0 auto;padding:18px 14px calc(92px + env(safe-area-inset-bottom))}
    .topbar{position:sticky;top:0;z-index:20;margin:-18px -14px 14px;padding:14px 14px 10px;background:rgba(255,248,237,.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(234,223,206,.75)}
    .topbar-inner{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#ffb84d,#ff8c6b);display:grid;place-items:center;box-shadow:var(--shadow);font-size:22px}.brand h1{font-size:20px;line-height:1.05;margin:0;white-space:nowrap}.subtitle{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.date-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill,.datebox,.searchbox{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;box-shadow:0 2px 10px rgba(0,0,0,.04)}.datebox{min-width:146px}.primary{background:var(--accent);border-color:#e7a133;font-weight:800}.danger{background:#fff4f4;color:#9f3434;border-color:#efc8c8}.layout{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:900px){.layout{grid-template-columns:270px 1fr}.sidebar{position:sticky;top:86px;align-self:start}.app{padding-left:20px;padding-right:20px}.topbar{margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px}}
    .panel,.card,.hero{background:rgba(255,253,248,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.panel,.card,.hero{padding:15px}.panel h2,.card h2{font-size:15px;margin:0 0 10px}.muted{color:var(--muted);font-size:12px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:17px;padding:10px}.stat b{display:block;font-size:20px}.date-list{display:flex;flex-direction:column;gap:8px;max-height:450px;overflow:auto;padding-right:2px}.date-item{width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:17px;padding:10px 11px;display:flex;align-items:center;justify-content:space-between;gap:8px}.date-item.active{outline:2px solid var(--accent);background:#fff7df}.date-item small{display:block;color:var(--muted);margin-top:2px}.main{display:flex;flex-direction:column;gap:14px}.hero{display:grid;gap:12px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-42px;top:-50px;width:160px;height:160px;border-radius:999px;background:rgba(255,184,77,.22);pointer-events:none}.hero-row{position:relative;display:flex;gap:9px;align-items:center;flex-wrap:wrap}.hero-title{font-size:22px;font-weight:900}.weekday{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 11px;color:var(--muted)}.quick{display:grid;grid-template-columns:1fr;gap:10px;position:relative}@media(min-width:720px){.quick{grid-template-columns:1.1fr .9fr .9fr}}.quick-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.quick-card label{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 10px;min-width:40px;text-align:center}.chip.active{background:var(--accent2);border-color:#e9b648;font-weight:800}.field{margin-bottom:10px}.field label{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#fff;border-radius:15px;padding:11px 12px;outline:none}.field textarea{min-height:92px;resize:vertical;line-height:1.55}.field input:focus,.field textarea:focus,.field select:focus{border-color:#e6a632;box-shadow:0 0 0 3px rgba(255,184,77,.22)}.grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}.form-grid{display:grid;grid-template-columns:1fr;gap:10px}@media(min-width:520px){.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:1fr 1fr 1fr}}.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.card-title{font-weight:900;display:flex;align-items:center;gap:8px}.badge{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.water{display:flex;gap:5px;flex-wrap:wrap;align-items:center}.drop{width:26px;height:26px;border:1px solid #bdd6e7;border-radius:999px;background:#fff;display:grid;place-items:center;font-size:12px;color:#74a6c6}.drop.active{background:#dcecf8}.score-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.score-chip{border:1px solid var(--line);background:#fff;border-radius:999px;min-width:44px;padding:8px 10px;text-align:center}.score-chip.active{background:var(--accent);border-color:#e7a133;font-weight:900}.radio-row{display:flex;gap:8px;flex-wrap:wrap}.radio-row label{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:#fff;color:var(--ink);font-size:13px;margin:0}.note-list{display:flex;flex-direction:column;gap:10px}.note-row{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;display:grid;gap:8px}.note-main{display:grid;grid-template-columns:72px 96px 1fr auto;gap:8px;align-items:start}.note-main input{border:1px solid var(--line);background:#fffdf8;border-radius:12px;padding:10px;min-width:0}.note-main button{border:1px solid var(--line);background:#fff4f4;color:#9f3434;border-radius:12px;padding:10px}@media(max-width:640px){.note-main{grid-template-columns:68px 1fr auto}.note-main .note-time{grid-column:2/3}.note-main .note-text{grid-column:1/4}.note-main .note-del{grid-column:3/4;grid-row:1/3}.topbar-inner{align-items:flex-start}.date-controls{max-width:190px}.subtitle{max-width:180px}.datebox{min-width:134px}}
    .emoji-panel{display:grid;gap:6px;background:#fff8ed;border:1px dashed var(--line);border-radius:14px;padding:8px}.emoji-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.emoji-label{font-size:12px;color:var(--muted);min-width:42px}.emoji-btn{border:1px solid var(--line);background:#fff;border-radius:999px;min-width:32px;height:32px;padding:0 6px}.add-note{width:100%;border:1px dashed #e3b35a;background:#fff4d7;border-radius:14px;padding:11px;margin-top:8px;color:#67480e}.toolbar{display:flex;flex-wrap:wrap;gap:8px}.toolbar button,.toolbar label{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.03);cursor:pointer}.toolbar input[type=file]{display:none}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,248,237,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.tabs-inner{max-width:1180px;margin:auto;display:flex;gap:8px;overflow:auto}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px}.tab.active{background:var(--accent);border-color:#e7a133;font-weight:800}.saved{margin-left:auto;color:var(--muted);font-size:12px;align-self:center;white-space:nowrap}.empty{padding:18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:#fff}.library-grid{display:grid;gap:10px}.result{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:left;width:100%}.result-title{font-weight:800}.result-meta{color:var(--muted);font-size:12px;margin-top:4px}.result-body{font-size:13px;line-height:1.5;margin-top:6px;color:#403b36}.backup-box textarea{min-height:180px}.tone-sleep{background:linear-gradient(180deg,#fff,#f7fbff)}.tone-diet{background:linear-gradient(180deg,#fff,#fff7f6)}.tone-reading{background:linear-gradient(180deg,#fff,#f8fff4)}.tone-exercise{background:linear-gradient(180deg,#fff,#f5fbff)}.tone-notes{background:linear-gradient(180deg,#fff,#fffaf0)}.tone-inspire{background:linear-gradient(180deg,#fff,#fff7fb)}.tone-learn{background:linear-gradient(180deg,#fff,#f8f8ff)}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#23201e;color:#fff;border-radius:999px;padding:10px 14px;z-index:99;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}.view{display:none}.view.active{display:block}@media print{.topbar,.sidebar,.tabs,.toolbar,.add-note,.note-del,.emoji-panel{display:none!important}.app{padding:0}.layout{display:block}.card,.panel,.hero{box-shadow:none;break-inside:avoid}.grid{grid-template-columns:1fr 1fr}.field input,.field textarea,.field select{border:0;padding:2px;background:transparent}}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><div class="brand"><div class="logo">✍️</div><div><h1>轻量日记</h1><div class="subtitle">多伦多时间 · 本地保存 · 可备份导入</div></div></div><div class="date-controls"><button class="pill" id="prevDay">‹</button><input class="datebox" id="entryDate" type="date" /><button class="pill" id="nextDay">›</button><button class="pill primary" id="todayBtn">今天</button></div></div></div>
  <div class="app"><div class="layout">
    <aside class="sidebar"><div class="panel"><h2>近 7 天</h2><div class="stats"><div class="stat"><span class="muted">已有日记</span><b id="totalCount">0</b></div><div class="stat"><span class="muted">本周记录</span><b id="weekCount">0</b></div></div><div class="date-list" id="recentList"></div></div></aside>
    <main class="main">
      <section class="view active" id="viewToday">
        <div class="hero"><div class="hero-row"><div class="hero-title" id="dateLabel">—</div><div class="weekday" id="weekdayLabel">—</div></div><div class="quick"><div class="quick-card"><label>心情</label><div class="chips" id="moodChips"></div><div class="field" style="margin-top:8px;margin-bottom:0"><input id="customMood" placeholder="自定义心情，例如：平静 / 忙乱" /></div></div><div class="quick-card"><label>天气</label><div class="chips" id="weatherChips"></div><div class="field" style="margin-top:8px;margin-bottom:0"><input id="customWeather" placeholder="自定义天气" /></div></div><div class="quick-card"><label>饮水</label><div class="water" id="waterRow"></div><div class="muted" style="margin-top:6px">点水滴记录，最多 10 杯</div></div></div></div>
        <div class="grid" style="margin-top:14px">
          <section class="card tone-sleep"><div class="card-head"><div class="card-title">🌙 今日睡眠</div><span class="badge" id="sleepDuration">—</span></div><div class="form-grid two"><div class="field"><label>入睡时间</label><input id="sleepStart" type="time" /></div><div class="field"><label>起床时间</label><input id="sleepEnd" type="time" /></div></div><div class="field"><label>梦境 / 备注</label><textarea id="dream" placeholder="夜醒、翻身、梦境、精神状态……"></textarea></div><div class="field"><label>睡眠评分</label><div class="score-row" id="sleepScoreRow"></div></div></section>
          <section class="card tone-diet"><div class="card-head"><div class="card-title">🍽️ 今日饮食</div><span class="badge">0–5 分</span></div><div class="form-grid two"><div class="field"><label>早餐</label><input id="breakfast" /></div><div class="field"><label>午餐</label><input id="lunch" /></div><div class="field"><label>晚餐</label><input id="dinner" /></div><div class="field"><label>加餐</label><input id="snacks" /></div></div><div class="field"><label>饮食方式</label><div class="radio-row" id="diningModeRow"></div></div><div class="field"><label>饮食满意度</label><div class="score-row" id="foodScoreRow"></div></div></section>
          <section class="card tone-reading"><div class="card-head"><div class="card-title">📖 今日阅读</div><span class="badge">摘记</span></div><div class="form-grid two"><div class="field"><label>书名</label><input id="readingBook" /></div><div class="field"><label>阅读时长 / 分钟</label><input id="readingMinutes" type="number" min="0" /></div></div><div class="field"><label>摘记 / 感想</label><textarea id="readingNotes"></textarea></div></section>
          <section class="card tone-exercise"><div class="card-head"><div class="card-title">🧘 今日运动</div><span class="badge">身体反馈</span></div><div class="form-grid two"><div class="field"><label>运动内容</label><input id="exerciseType" /></div><div class="field"><label>运动时长 / 分钟</label><input id="exerciseMinutes" type="number" min="0" /></div></div><div class="field"><label>身体反馈</label><textarea id="bodyFeedback" placeholder="脚底、膝盖、腰背、肩颈、疲劳程度……"></textarea></div></section>
          <section class="card tone-notes wide"><div class="card-head"><div class="card-title">🧾 今日流水账</div><span class="badge">支持自定义 emoji / 标签</span></div><div class="note-list" id="timelineList"></div><button class="add-note" id="addNote">＋ 新增一条流水账</button></section>
          <section class="card tone-inspire"><div class="card-head"><div class="card-title">💡 今日灵感</div><span class="badge">想法</span></div><div class="field"><textarea id="inspiration" placeholder="突然想到的点子、以后想做的事……"></textarea></div></section>
          <section class="card tone-learn"><div class="card-head"><div class="card-title">🧠 今日新知</div><span class="badge">来源</span></div><div class="field"><label>新学到的内容</label><textarea id="knowledge"></textarea></div><div class="field"><label>来源</label><input id="knowledgeSource" placeholder="书、文章、视频、对话……" /></div></section>
        </div>
      </section>
      <section class="view" id="viewLibrary"><div class="card"><div class="card-head"><div class="card-title">📚 日记库</div><span class="badge" id="libraryCount">0 条</span></div><div class="field"><input class="searchbox" id="searchInput" placeholder="搜索日期、心情、流水账、阅读、灵感、新知……" /></div><div class="library-grid" id="libraryResults"></div></div></section>
      <section class="view" id="viewBackup"><div class="card backup-box"><div class="card-head"><div class="card-title">🗂️ 备份 / 导入</div><span class="badge">JSON 推荐</span></div><div class="toolbar"><button id="copyJsonBtn">复制 JSON 备份</button><button id="downloadJsonBtn">下载 JSON</button><button id="downloadCsvBtn">下载 CSV</button><label>导入 JSON 文件<input type="file" id="importFile" accept="application/json,.json" /></label><button id="printBtn">打印 / 存 PDF</button></div><p class="muted">数据保存在当前设备当前浏览器。换电脑、换手机或清理缓存前，先导出 JSON 备份。</p><div class="field"><label>粘贴 JSON 后导入</label><textarea id="importText" placeholder="把之前导出的 JSON 完整粘贴到这里"></textarea></div><div class="toolbar"><button class="primary" id="importTextBtn">导入粘贴内容</button><button class="danger" id="deleteCurrentBtn">删除当前日期日记</button><button class="danger" id="clearAllBtn">清空全部本地数据</button></div></div></section>
    </main>
  </div></div>
  <nav class="tabs"><div class="tabs-inner"><button class="tab active" data-view="Today">今日日记</button><button class="tab" data-view="Library">日记库</button><button class="tab" data-view="Backup">备份</button><span class="saved" id="savedText">已自动保存</span></div></nav><div class="toast" id="toast"></div>
<script>
(function(){
  const STORAGE_KEYS = ['EFFORTLESS_DIARY_ENTRIES_V2','EFFORTLESS_DIARY_ENTRIES_V1'];
  const SAVE_KEY = 'EFFORTLESS_DIARY_ENTRIES_V2';
  const moodOptions = ['😊','🙂','😌','🥰','😴','😫','😭','😤'];
  const weatherOptions = ['☀️','⛅','☁️','🌧️','❄️','💨','🌫️','🌈'];
  const diningModes = ['自己做','外卖','堂食','随便吃','没胃口'];
  const emojiGroups = {
    '心情':['😊','🙂','😌','🥰','😴','😫','😭','😤','🫠','😮‍💨'],
    '宝宝':['👶','🍼','🧸','🛝','🚼','🤱','🦷','💩','🛁','🧦'],
    '日常':['☀️','🍽️','☕','📖','🏠','🚗','🛒','💻','✨','📦'],
    '身体':['💪','🧘','🚶','🛏️','💊','🩹','🦶','🤕','🧠','🫧']
  };
  const fields = ['customMood','customWeather','sleepStart','sleepEnd','dream','breakfast','lunch','dinner','snacks','readingBook','readingMinutes','readingNotes','exerciseType','exerciseMinutes','bodyFeedback','inspiration','knowledge','knowledgeSource'];
  let currentDate = todayToronto();
  let entry = defaultEntry(currentDate);
  let saveTimer = null;

  function pad(n){ return String(n).padStart(2,'0'); }
  function todayToronto(){
    try{
      const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Toronto',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
      const m={}; parts.forEach(p=>m[p.type]=p.value); return `${m.year}-${m.month}-${m.day}`;
    }catch(e){
      const d = new Date(Date.now() - 4*60*60*1000); return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
    }
  }
  function dateAdd(key, days){ const [y,m,d]=key.split('-').map(Number); const dt = new Date(Date.UTC(y,m-1,d+days)); return `${dt.getUTCFullYear()}-${pad(dt.getUTCMonth()+1)}-${pad(dt.getUTCDate())}`; }
  function weekday(key){ const [y,m,d]=key.split('-').map(Number); return ['周日','周一','周二','周三','周四','周五','周六'][new Date(Date.UTC(y,m-1,d)).getUTCDay()]; }
  function dateLabel(key){ const [y,m,d]=key.split('-').map(Number); return `${y}年${m}月${d}日`; }
  function nowTorontoTime(){
    try{ const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Toronto',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date()); const m={}; parts.forEach(p=>m[p.type]=p.value); return `${m.hour}:${m.minute}`; }catch(e){ const d = new Date(Date.now()-4*3600*1000); return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`; }
  }
  function minsBetween(a,b){ if(!a||!b) return null; const [ah,am]=a.split(':').map(Number), [bh,bm]=b.split(':').map(Number); let x=ah*60+am, y=bh*60+bm; if(y<x) y+=1440; return y-x; }
  function fmtDuration(mins){ if(mins==null || Number.isNaN(mins)) return '—'; const h=Math.floor(mins/60), m=mins%60; return h ? `${h}小时${m?m+'分':''}` : `${m}分`; }
  function defaultEntry(date){ return {date,mood:'',weather:'',water:0,sleepStart:'',sleepEnd:'',dream:'',sleepScore:0,breakfast:'',lunch:'',dinner:'',snacks:'',diningMode:'',foodScore:0,readingBook:'',readingMinutes:'',readingNotes:'',exerciseType:'',exerciseMinutes:'',bodyFeedback:'',timeline:[],inspiration:'',knowledge:'',knowledgeSource:'',updatedAt:new Date().toISOString()}; }
  function loadMap(){
    for(const key of STORAGE_KEYS){
      try{ const raw=localStorage.getItem(key); if(raw){ const obj=JSON.parse(raw); if(obj && typeof obj==='object' && !Array.isArray(obj)) return obj; } }catch(e){}
    }
    return {};
  }
  function saveMap(map){ localStorage.setItem(SAVE_KEY, JSON.stringify(map)); }
  function normalizeEntry(item, fallbackDate){
    if(!item || typeof item !== 'object') return null; const date = item.date || fallbackDate; if(!date) return null; const e = Object.assign(defaultEntry(date), item);
    if(item.sleep && typeof item.sleep==='object'){ e.sleepStart=item.sleepStart||item.sleep.bedtime||item.sleep.start||''; e.sleepEnd=item.sleepEnd||item.sleep.wakeup||item.sleep.end||''; e.dream=item.dream||item.sleep.notes||''; e.sleepScore=item.sleepScore ?? item.sleep.rating ?? 0; }
    if(item.diet && typeof item.diet==='object'){ e.breakfast=item.breakfast||item.diet.breakfast||''; e.lunch=item.lunch||item.diet.lunch||''; e.dinner=item.dinner||item.diet.dinner||''; e.snacks=item.snacks||item.diet.snack||item.diet.snacks||''; e.diningMode=item.diningMode||item.diet.mode||''; e.foodScore=item.foodScore ?? item.diet.rating ?? 0; }
    if(item.reading && typeof item.reading==='object'){ e.readingBook=item.readingBook||item.reading.book||''; e.readingMinutes=item.readingMinutes||item.reading.minutes||''; e.readingNotes=item.readingNotes||item.reading.notes||''; }
    if(item.exercise && typeof item.exercise==='object'){ e.exerciseType=item.exerciseType||item.exercise.type||''; e.exerciseMinutes=item.exerciseMinutes||item.exercise.minutes||''; e.bodyFeedback=item.bodyFeedback||item.exercise.feedback||''; }
    if(Array.isArray(item.notes) && !Array.isArray(item.timeline)) e.timeline = item.notes;
    if(!Array.isArray(e.timeline)) e.timeline = [];
    e.timeline = e.timeline.map(n => ({emoji:n.emoji||n.tag||'', time:n.time||'', text:n.text||n.content||''}));
    e.sleepScore = Number(e.sleepScore || 0); e.foodScore = Number(e.foodScore || 0); e.water = Number(e.water || 0); e.date = date; return e;
  }
  function getEntry(date){ const map=loadMap(); return normalizeEntry(map[date], date) || defaultEntry(date); }
  function putEntry(e){ const map=loadMap(); const clean=normalizeEntry(Object.assign({},e,{updatedAt:new Date().toISOString()}), e.date); map[clean.date]=clean; saveMap(map); return clean; }
  function listEntries(){ const map=loadMap(); return Object.keys(map).map(k=>normalizeEntry(map[k], k)).filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date)); }
  function deleteEntry(date){ const map=loadMap(); delete map[date]; saveMap(map); }
  function esc(s){ return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function toast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }
  function $(id){ return document.getElementById(id); }
  function debounceSave(){ clearTimeout(saveTimer); $('savedText').textContent='保存中…'; saveTimer=setTimeout(()=>{ collect(); entry=putEntry(entry); $('savedText').textContent='已自动保存'; renderSide(); renderLibrary(); },250); }
  function selectChip(container, value){ [...container.querySelectorAll('.chip')].forEach(b=>b.classList.toggle('active', b.dataset.value===value)); }
  function renderChips(id, options, selected, onSelect){ const c=$(id); c.innerHTML=options.map(x=>`<button class="chip${x===selected?' active':''}" data-value="${esc(x)}">${esc(x)}</button>`).join(''); c.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>onSelect(btn.dataset.value))); }
  function renderScore(id, selected, onSelect){ const c=$(id); c.innerHTML=[0,1,2,3,4,5].map(n=>`<button class="score-chip${Number(selected)===n?' active':''}" data-score="${n}">${n}/5</button>`).join(''); c.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>onSelect(Number(b.dataset.score)))); }
  function renderDining(){ const c=$('diningModeRow'); c.innerHTML=diningModes.map(x=>`<label><input type="radio" name="diningMode" value="${esc(x)}" ${entry.diningMode===x?'checked':''}>${esc(x)}</label>`).join(''); c.querySelectorAll('input').forEach(i=>i.addEventListener('change',()=>{entry.diningMode=i.value; debounceSave();})); }
  function renderWater(){ const c=$('waterRow'); c.innerHTML=''; for(let i=1;i<=10;i++){ const b=document.createElement('button'); b.className='drop'+(i<=entry.water?' active':''); b.textContent='💧'; b.title=`${i}杯`; b.addEventListener('click',()=>{entry.water = entry.water===i ? i-1 : i; renderWater(); debounceSave();}); c.appendChild(b);} }

  function renderMoodChips(){ renderChips('moodChips', moodOptions, entry.mood, (v)=>{entry.mood=v; $('customMood').value=''; renderMoodChips(); debounceSave();}); }
  function renderWeatherChips(){ renderChips('weatherChips', weatherOptions, entry.weather, (v)=>{entry.weather=v; $('customWeather').value=''; renderWeatherChips(); debounceSave();}); }
  function renderSleepScore(){ renderScore('sleepScoreRow', entry.sleepScore, v=>{entry.sleepScore=v; renderSleepScore(); debounceSave();}); }
  function renderFoodScore(){ renderScore('foodScoreRow', entry.foodScore, v=>{entry.foodScore=v; renderFoodScore(); debounceSave();}); }

  function collect(){
    fields.forEach(id=>{ if(id==='customMood'){ if($(id).value.trim()) entry.mood=$(id).value.trim(); } else if(id==='customWeather'){ if($(id).value.trim()) entry.weather=$(id).value.trim(); } else { entry[id]=$(id).value; }});
    entry.date=currentDate;
  }
  function fill(){
    $('entryDate').value=currentDate; $('dateLabel').textContent=dateLabel(currentDate); $('weekdayLabel').textContent=weekday(currentDate); $('customMood').value = moodOptions.includes(entry.mood)?'':entry.mood; $('customWeather').value = weatherOptions.includes(entry.weather)?'':entry.weather;
    fields.forEach(id=>{ if(id!=='customMood'&&id!=='customWeather'&&$(id)) $(id).value=entry[id]||''; });
    $('sleepDuration').textContent=fmtDuration(minsBetween(entry.sleepStart, entry.sleepEnd));
    renderMoodChips();
    renderWeatherChips();
    renderWater(); renderSleepScore(); renderFoodScore(); renderDining(); renderTimeline(); renderSide(); renderLibrary();
  }
  function loadDate(date){ collect(); entry=putEntry(entry); currentDate=date; entry=getEntry(currentDate); fill(); }
  function emojiPanel(idx){ return `<div class="emoji-panel">${Object.entries(emojiGroups).map(([g,arr])=>`<div class="emoji-group"><span class="emoji-label">${esc(g)}</span>${arr.map(e=>`<button class="emoji-btn" data-idx="${idx}" data-emoji="${esc(e)}">${esc(e)}</button>`).join('')}</div>`).join('')}</div>`; }
  function renderTimeline(){ const list=$('timelineList'); if(!entry.timeline.length){ list.innerHTML='<div class="empty">还没有流水账。可以记录宝宝、心情、事件、身体反馈或零碎想法。</div>'; return; } list.innerHTML=entry.timeline.map((n,i)=>`<div class="note-row"><div class="note-main"><input class="note-emoji" data-idx="${i}" value="${esc(n.emoji||'')}" placeholder="emoji/标签"><input class="note-time" data-idx="${i}" type="time" value="${esc(n.time||'')}"><input class="note-text" data-idx="${i}" value="${esc(n.text||'')}" placeholder="记录一件事"><button class="note-del" data-idx="${i}">删除</button></div>${emojiPanel(i)}</div>`).join(''); list.querySelectorAll('.note-emoji').forEach(inp=>inp.addEventListener('input',()=>{entry.timeline[+inp.dataset.idx].emoji=inp.value; debounceSave();})); list.querySelectorAll('.note-time').forEach(inp=>inp.addEventListener('input',()=>{entry.timeline[+inp.dataset.idx].time=inp.value; debounceSave();})); list.querySelectorAll('.note-text').forEach(inp=>inp.addEventListener('input',()=>{entry.timeline[+inp.dataset.idx].text=inp.value; debounceSave();})); list.querySelectorAll('.note-del').forEach(btn=>btn.addEventListener('click',()=>{entry.timeline.splice(+btn.dataset.idx,1); renderTimeline(); debounceSave();})); list.querySelectorAll('.emoji-btn').forEach(btn=>btn.addEventListener('click',()=>{entry.timeline[+btn.dataset.idx].emoji=btn.dataset.emoji; renderTimeline(); debounceSave();})); }
  function entrySummary(e){ const parts=[]; if(e.mood) parts.push(`心情：${e.mood}`); if(e.weather) parts.push(`天气：${e.weather}`); if(e.readingBook) parts.push(`阅读：${e.readingBook}`); if(e.exerciseType) parts.push(`运动：${e.exerciseType}`); if(e.timeline?.length) parts.push(`流水账 ${e.timeline.length} 条`); if(e.inspiration) parts.push(`灵感：${e.inspiration.slice(0,24)}`); return parts.join('｜') || '暂无摘要'; }
  function renderSide(){ const entries=listEntries(); $('totalCount').textContent=entries.length; const start=dateAdd(todayToronto(),-6); $('weekCount').textContent=entries.filter(e=>e.date>=start && e.date<=todayToronto()).length; const recent=entries.slice(0,14); $('recentList').innerHTML=recent.length?recent.map(e=>`<button class="date-item${e.date===currentDate?' active':''}" data-date="${e.date}"><span><b>${esc(e.date)}</b><small>${esc(entrySummary(e))}</small></span><span>${esc(e.mood||'›')}</span></button>`).join(''):'<div class="empty">暂无记录</div>'; $('recentList').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{showView('Today'); loadDate(b.dataset.date);})); }
  function fullText(e){ return [e.date,e.mood,e.weather,e.dream,e.breakfast,e.lunch,e.dinner,e.snacks,e.diningMode,e.readingBook,e.readingNotes,e.exerciseType,e.bodyFeedback,e.inspiration,e.knowledge,e.knowledgeSource,(e.timeline||[]).map(n=>`${n.emoji} ${n.time} ${n.text}`).join(' ')].join(' ').toLowerCase(); }
  function renderLibrary(){ const q=($('searchInput').value||'').trim().toLowerCase(); let entries=listEntries(); if(q) entries=entries.filter(e=>fullText(e).includes(q)); $('libraryCount').textContent=`${entries.length} 条`; $('libraryResults').innerHTML=entries.length?entries.map(e=>`<button class="result" data-date="${e.date}"><div class="result-title">${esc(dateLabel(e.date))} ${esc(weekday(e.date))} ${esc(e.mood||'')}</div><div class="result-meta">${esc(entrySummary(e))}</div><div class="result-body">${esc((e.timeline||[]).map(n=>`${n.emoji||''} ${n.time||''} ${n.text||''}`.trim()).filter(Boolean).join(' / ') || e.inspiration || e.knowledge || '')}</div></button>`).join(''):'<div class="empty">没有匹配的日记</div>'; $('libraryResults').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{showView('Today'); loadDate(b.dataset.date);})); }
  function exportObj(){ return {app:'EffortlessDiary_Web_PWA',version:2,timezone:'America/Toronto',exportedAt:new Date().toISOString(),entries:listEntries()}; }
  function download(name, text, type){ const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
  function csvEsc(v){ const s=String(v??''); return `"${s.replace(/"/g,'""')}"`; }
  function csvText(){ const cols=[['date','日期'],['mood','心情'],['weather','天气'],['water','饮水'],['sleepStart','入睡'],['sleepEnd','起床'],['dream','睡眠备注'],['sleepScore','睡眠评分'],['breakfast','早餐'],['lunch','午餐'],['dinner','晚餐'],['snacks','加餐'],['diningMode','饮食方式'],['foodScore','饮食满意度'],['readingBook','书名'],['readingMinutes','阅读分钟'],['readingNotes','阅读摘记'],['exerciseType','运动内容'],['exerciseMinutes','运动分钟'],['bodyFeedback','身体反馈'],['timeline','流水账'],['inspiration','灵感'],['knowledge','新知'],['knowledgeSource','来源']]; const rows=[cols.map(c=>csvEsc(c[1])).join(',')]; listEntries().forEach(e=>rows.push(cols.map(([k])=>csvEsc(k==='timeline'?(e.timeline||[]).map(n=>`${n.emoji||''} ${n.time||''} ${n.text||''}`.trim()).join('\n'):e[k])).join(','))); return rows.join('\n'); }
  function parseImport(text){ let t=String(text||'').trim(); t=t.replace(/^```(?:json)?/i,'').replace(/```$/,'').trim(); const firstObj=t.indexOf('{'), firstArr=t.indexOf('['); const start = firstObj<0?firstArr:firstArr<0?firstObj:Math.min(firstObj,firstArr); if(start>0) t=t.slice(start); const lastObj=t.lastIndexOf('}'), lastArr=t.lastIndexOf(']'); const end=Math.max(lastObj,lastArr); if(end>=0) t=t.slice(0,end+1); const data=JSON.parse(t); let items=[]; if(Array.isArray(data)) items=data; else if(Array.isArray(data.entries)) items=data.entries; else if(data.entries && typeof data.entries==='object') items=Object.keys(data.entries).map(k=>Object.assign({date:k},data.entries[k])); else items=Object.keys(data).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).map(k=>Object.assign({date:k},data[k])); const normalized=items.map(x=>normalizeEntry(x,x.date)).filter(Boolean); if(!normalized.length) throw new Error('没有识别到日记记录'); return normalized; }
  function importEntries(text){ const arr=parseImport(text); const map=loadMap(); arr.forEach(e=>map[e.date]=e); saveMap(map); entry=getEntry(currentDate); fill(); toast(`已导入 ${arr.length} 条`); }
  function showView(name){ ['Today','Library','Backup'].forEach(v=>{$('view'+v).classList.toggle('active', v===name);}); document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===name)); if(name==='Library') renderLibrary(); }

  function init(){
    $('prevDay').onclick=()=>loadDate(dateAdd(currentDate,-1)); $('nextDay').onclick=()=>loadDate(dateAdd(currentDate,1)); $('todayBtn').onclick=()=>loadDate(todayToronto()); $('entryDate').onchange=()=>{ if($('entryDate').value) loadDate($('entryDate').value); };
    fields.forEach(id=>{ const el=$(id); if(el) el.addEventListener('input',()=>{ collect(); $('sleepDuration').textContent=fmtDuration(minsBetween(entry.sleepStart,entry.sleepEnd)); selectChip($('moodChips'), entry.mood); selectChip($('weatherChips'), entry.weather); debounceSave(); }); });
    $('addNote').onclick=()=>{ entry.timeline.push({emoji:'',time:nowTorontoTime(),text:''}); renderTimeline(); debounceSave(); };
    $('searchInput').addEventListener('input',renderLibrary); document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>showView(t.dataset.view)));
    $('copyJsonBtn').onclick=async()=>{ const txt=JSON.stringify(exportObj(),null,2); try{ await navigator.clipboard.writeText(txt); toast('JSON 已复制'); }catch(e){ $('importText').value=txt; toast('已放入文本框，请手动复制'); } };
    $('downloadJsonBtn').onclick=()=>download(`轻量日记备份_${todayToronto()}.json`, JSON.stringify(exportObj(),null,2), 'application/json;charset=utf-8');
    $('downloadCsvBtn').onclick=()=>download(`轻量日记_${todayToronto()}.csv`, '\ufeff'+csvText(), 'text/csv;charset=utf-8');
    $('importTextBtn').onclick=()=>{ try{ importEntries($('importText').value); $('importText').value=''; }catch(e){ alert('JSON 格式错误或内容无法识别：\n'+e.message); } };
    $('importFile').onchange=()=>{ const f=$('importFile').files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ importEntries(r.result); }catch(e){ alert('JSON 格式错误或内容无法识别：\n'+e.message); } }; r.readAsText(f); };
    $('deleteCurrentBtn').onclick=()=>{ if(confirm('删除当前日期的日记？')){ deleteEntry(currentDate); entry=defaultEntry(currentDate); fill(); toast('已删除当前日期'); } };
    $('clearAllBtn').onclick=()=>{ if(confirm('确定清空全部本地日记？请先导出备份。')){ localStorage.removeItem(SAVE_KEY); localStorage.removeItem('EFFORTLESS_DIARY_ENTRIES_V1'); entry=defaultEntry(currentDate); fill(); toast('已清空'); } };
    $('printBtn').onclick=()=>window.print();
    entry=getEntry(currentDate); fill(); if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
  }
  init();
})();
</script>
</body>
</html>
